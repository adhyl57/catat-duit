<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catat Duit Pro Cloud</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --bg: #0f172a; --card: #1e293b; --text: #e2e8f0; --muted: #94a3b8;
    --green: #22c55e; --red: #ef4444; --blue: #3b82f6; --purple: #a855f7;
    --border: #334155; --warn: #f59e0b;
  }
  [data-theme="light"] {
    --bg: #f8fafc; --card: #fff; --text: #1e293b; --muted: #64748b;
    --border: #e2e8f0;
  }
    * { box-sizing: border-box; font-family: system-ui, sans-serif; }
  body { margin: 0; background: var(--bg); color: var(--text); padding: 16px; transition: 0.2s; }
.hidden { display: none!important; }
.card { background: var(--card); padding: 16px; border-radius: 12px; margin-bottom: 16px; border: 1px solid var(--border); }
  input, select, button {
    width: 100%; padding: 10px; margin: 6px 0; border: 1px solid var(--border); border-radius: 8px;
    font-size: 1rem; background: var(--bg); color: var(--text);
  }
  button { background: var(--blue); color: white; border: none; font-weight: 600; cursor: pointer; }
  button.danger { background: var(--red); }
  button.ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
  button.warn { background: var(--warn); }
.row { display: flex; gap: 8px; }
.row > * { flex: 1; }
.summary { display: flex; justify-content: space-between; font-weight: 600; }
.income { color: var(--green); }
.expense { color: var(--red); }
  table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
  td, th { padding: 8px; text-align: left; border-bottom: 1px solid var(--border); }
  canvas { max-height: 220px; }
.muted { color: var(--muted); font-size: 0.85rem; }
.topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.actions button { width: auto; padding: 4px 8px; font-size: 0.8rem; margin: 0 2px; }
.alert { background: var(--warn); color: #000; padding: 10px; border-radius: 8px; margin-bottom: 12px; }
</style>
</head>
<body>

<div id="auth" class="card">
  <h3>Login / Daftar</h3>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <div class="row">
    <button onclick="signUp()">Daftar</button>
    <button onclick="signIn()">Login</button>
  </div>
  <p class="muted">Data tersimpan aman di cloud</p>
</div>

<div id="app" class="hidden">
  <div class="topbar">
    <h1 style="margin:0">💰 Catat Duit</h1>
    <div class="row" style="width:auto">
      <button class="ghost" style="width:auto" onclick="toggleTheme()">🌙</button>
      <button class="ghost" style="width:auto" onclick="openSettings()">⚙️</button>
      <button class="ghost" style="width:auto" onclick="signOut()">Logout</button>
    </div>
  </div>

  <div id="budgetAlert" class="alert hidden"></div>

  <div class="card">
    <div class="row">
      <input type="month" id="filterMonth" onchange="render()">
      <button class="ghost" onclick="resetFilter()">Reset</button>
    </div>
  </div>

  <div class="card">
    <h3>Tambah / Edit Transaksi</h3>
    <input type="hidden" id="editId">
    <div class="row">
      <select id="type" onchange="updateCats()">
        <option value="expense">Pengeluaran</option>
        <option value="income">Pemasukan</option>
      </select>
      <select id="cat"></select>
    </div>
    <input type="text" id="desc" placeholder="Keterangan">
    <div class="row">
      <input type="number" id="amount" placeholder="Jumlah Rp" min="0">
      <input type="date" id="date">
    </div>
    <div class="row">
      <button id="saveBtn" onclick="saveTransaction()">Simpan</button>
      <button class="ghost hidden" id="cancelBtn" onclick="cancelEdit()">Batal</button>
    </div>
    <button class="ghost" onclick="exportCSV()">Export CSV</button>
  </div>

  <div class="card">
    <div class="summary">
      <div>Pemasukan: <span class="income" id="totalIncome">Rp0</span></div>
      <div>Pengeluaran: <span class="expense" id="totalExpense">Rp0</span></div>
    </div>
    <div class="summary" style="margin-top:8px">
      <div>Saldo: <span id="balance">Rp0</span></div>
    </div>
  </div>

  <div class="card">
    <h3>Grafik 6 Bulan</h3>
    <canvas id="barChart"></canvas>
  </div>

  <div class="card">
    <h3>Pengeluaran per Kategori</h3>
    <canvas id="pieChart"></canvas>
  </div>

  <div class="card">
    <h3>Riwayat</h3>
    <table id="table">
      <thead><tr><th>Tgl</th><th>Kat</th><th>Ket</th><th>Jumlah</th><th></th></tr></thead>
      <tbody></tbody>
    </table>
    <p class="muted" id="empty">Belum ada transaksi</p>
  </div>
</div>

<div id="settingsModal" class="card hidden">
  <h3>Pengaturan</h3>
  <h4>Kategori Custom</h4>
  <input type="text" id="newCat" placeholder="Tambah kategori pengeluaran">
  <button onclick="addCustomCat()">Tambah</button>
  <div id="catList" class="muted"></div>

  <h4>Budget Bulanan</h4>
  <input type="number" id="budget" placeholder="Limit pengeluaran per bulan" min="0">
  <button onclick="saveBudget()">Simpan Budget</button>

  <button class="ghost" onclick="closeSettings()" style="margin-top:12px">Tutup</button>
</div>

<script>
const SUPABASE_URL = 'https://wjzvnwkmmglgimamspwc.supabase.co';
const SUPABASE_KEY = 'sb_publishable_nfxU1mTiDHhQgDG_1U6eTQ_-7ePLctc';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let data = [];
let barChart, pieChart;
let user = null;
let customCats = JSON.parse(localStorage.getItem('customCats') || '[]');
let budgetLimit = parseFloat(localStorage.getItem('budgetLimit') || 0);

const defaultCats = {
  expense: ['Makan', 'Transport', 'Belanja', 'Tagihan', 'Hiburan', 'Kesehatan', 'Lainnya'],
  income: ['Gaji', 'Freelance', 'Bisnis', 'Investasi', 'Lainnya']
};

document.getElementById('date').valueAsDate = new Date();
document.getElementById('filterMonth').value = new Date().toISOString().slice(0,7);
document.getElementById('budget').value = budgetLimit || '';
loadTheme();
updateCats();
renderCatList();

supabase.auth.getSession().then(({ data: { session } }) => {
  if (session) {
    user = session.user;
    showApp();
    loadData();
  }
});

function loadTheme() {
  const theme = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', theme);
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark'? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}

function openSettings() { settingsModal.classList.remove('hidden'); }
function closeSettings() { settingsModal.classList.add('hidden'); }

function addCustomCat() {
  const cat = newCat.value.trim();
  if (!cat || customCats.includes(cat)) return;
  customCats.push(cat);
  localStorage.setItem('customCats', JSON.stringify(customCats));
  newCat.value = '';
  updateCats();
  renderCatList();
}

function renderCatList() {
  catList.innerHTML = customCats.length
  ? 'Kategori: ' + customCats.join(', ')
    : 'Belum ada kategori custom';
}

function saveBudget() {
  budgetLimit = parseFloat(budget.value) || 0;
  localStorage.setItem('budgetLimit', budgetLimit);
  checkBudget();
  alert('Budget tersimpan');
}

function checkBudget() {
  const ym = filterMonth.value || new Date().toISOString().slice(0,7);
  const expense = data.filter(t => t.txn_date.startsWith(ym) && t.type==='expense')
                   .reduce((a,b)=>a+b.amount,0);
  if (budgetLimit > 0 && expense > budgetLimit) {
    budgetAlert.innerHTML = `⚠️ Pengeluaran bulan ini Rp${expense.toLocaleString('id-ID')} sudah melebihi budget Rp${budgetLimit.toLocaleString('id-ID')}`;
    budgetAlert.classList.remove('hidden');
  } else {
    budgetAlert.classList.add('hidden');
  }
}

function updateCats() {
  const allExpenseCats = [...defaultCats.expense,...customCats];
  const cats = {
    expense: allExpenseCats,
    income: defaultCats.income
  };
  cat.innerHTML = cats[type.value].map(c => `<option>${c}</option>`).join('');
}

async function signUp() {
  const { error } = await supabase.auth.signUp({ email: email.value, password: password.value });
  if (error) alert(error.message);
  else alert('Cek email untuk verifikasi, lalu login');
}

async function signIn() {
  const { data: { user: u }, error } = await supabase.auth.signInWithPassword({ email: email.value, password: password.value });
  if (error) return alert(error.message);
  user = u;
  showApp();
  loadData();
}

async function signOut() {
  await supabase.auth.signOut();
  user = null;
  app.classList.add('hidden');
  auth.classList.remove('hidden');
}

function showApp() {
  auth.classList.add('hidden');
  app.classList.remove('hidden');
}

async function loadData() {
  const { data: rows, error } = await supabase
.from('transactions')
.select('*')
.eq('user_id', user.id)
.order('txn_date', { ascending: false });
  if (error) return alert(error.message);
  data = rows;
  render();
}

async function saveTransaction() {
  const id = editId.value;
  const t = {
    user_id: user.id,
    type: type.value,
    cat: cat.value,
    description: desc.value.trim(),
    amount: parseFloat(amount.value),
    txn_date: date.value
  };
  if (!t.description ||!t.amount || t.amount <= 0) return alert('Isi dengan benar');

  if (id) {
    const { error } = await supabase.from('transactions').update(t).eq('id', id);
    if (error) return alert(error.message);
  } else {
    const { error } = await supabase.from('transactions').insert(t);
    if (error) return alert(error.message);
  }
  cancelEdit();
  loadData();
}

function editTransaction(id) {
  const t = data.find(x => x.id === id);
  if (!t) return;
  editId.value = t.id;
  type.value = t.type;
  updateCats();
  cat.value = t.cat;
  desc.value = t.description;
  amount.value = t.amount;
  date.value = t.txn_date;
  saveBtn.textContent = 'Update';
  cancelBtn.classList.remove('hidden');
  window.scrollTo(0,0);
}

function cancelEdit() {
  editId.value = '';
  desc.value = '';
  amount.value = '';
  saveBtn.textContent = 'Simpan';
  cancelBtn.classList.add('hidden');
}

async function deleteTransaction(id) {
  if (!confirm('Hapus transaksi ini?')) return;
  const { error } = await supabase.from('transactions').delete().eq('id', id);
  if (error) return alert(error.message);
  loadData();
}

function resetFilter() {
  filterMonth.value = '';
  render();
}

function getFilteredData() {
  const ym = filterMonth.value;
  if (!ym) return data;
  return data.filter(t => t.txn_date.startsWith(ym));
}

function render() {
  const fData = getFilteredData();
  let income = 0, expense = 0;
  tbody.innerHTML = '';

  fData.forEach(t => {
    if (t.type === 'income') income += t.amount;
    else expense += t.amount;
    tbody.innerHTML += `
      <tr>
        <td>${t.txn_date.slice(5)}</td>
        <td>${t.cat}</td>
        <td>${t.description}</td>
        <td class="${t.type}">${t.type==='income'?'+':'-'} ${formatRp(t.amount)}</td>
        <td class="actions">
          <button class="ghost" onclick="editTransaction('${t.id}')">Edit</button>
          <button class="danger" onclick="deleteTransaction('${t.id}')">Hapus</button>
        </td>
      </tr>`;
  });

  totalIncome.textContent = formatRp(income);
  totalExpense.textContent = formatRp(expense);
  balance.textContent = formatRp(income - expense);
  empty.style.display = fData.length? 'none' : 'block';

  drawBarChart();
  drawPieChart();
  checkBudget();
}

function formatRp(num) {
  return 'Rp' + num.toLocaleString('id-ID');
}

function drawBarChart() {
  const months = [], incData = [], expData = [];
  const now = new Date();
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const ym = d.toISOString().slice(0,7);
    months.push(d.toLocaleString('id-ID', {month: 'short'}));
    incData.push(data.filter(t => t.txn_date.startsWith(ym) && t.type==='income').reduce((a,b)=>a+b.amount,0));
    expData.push(data.filter(t => t.txn_date.startsWith(ym) && t.type==='expense').reduce((a,b)=>a+b.amount,0));
  }
  if (barChart) barChart.destroy();
  barChart = new Chart(barChart, {
    type: 'bar',
    data: {
      labels: months,
      datasets: [
        { label: 'Pemasukan', data: incData, backgroundColor: '#22c55e' },
        { label: 'Pengeluaran', data: expData, backgroundColor: '#ef4444' }
      ]
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: getComputedStyle(document.body).color } },
      scales: {
        x: { ticks: { color: getComputedStyle(document.body).color } },
        y: { ticks: { color: getComputedStyle(document.body).color, callback: v => 'Rp'+v/1000+'k' } }
      }
    }
  });
}

function drawPieChart() {
  const fData = getFilteredData().filter(t => t.type === 'expense');
  const catMap = {};
  fData.forEach(t => {
    catMap[t.cat] = (catMap[t.cat] || 0) + t.amount;
  });

  if (pieChart) pieChart.destroy();
  pieChart = new Chart(pieChart, {
    type: 'pie',
    data: {
      labels: Object.keys(catMap),
      datasets: [{
        data: Object.values(catMap),
        backgroundColor: ['#3b82f6','#22c55e','#ef4444','#a855f7','#f59e0b','#06b6d4','#f97316','#ec4899','#10b981']
      }]
    },
    options: {
      plugins: { legend: { labels: { color: getComputedStyle(document.body).color } }
    }
  });
}

function exportCSV() {
  const fData = getFilteredData();
  if (!fData.length) return alert('Belum ada data');
  let csv = 'Tanggal,Kategori,Jenis,Keterangan,Jumlah\n';
  fData.forEach(t => {
    csv += `${t.txn_date},${t.cat},${t.type},"${t.description}",${t.amount}\n`;
  });
  const blob = new Blob([csv], {type: 'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'keuangan.csv'; a.click();
}
</script>
</body>
</html>
