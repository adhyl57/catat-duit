<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="/manifest.json">
<title>Catat Duit</title>

<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
:root {
  --bg: #0f172a; --card: #1e293b; --text: #e2e8f0; --border: #334155;
  --input-bg: #0f172a; --primary: #3b82f6; --danger: #ef4444; --success: #22c55e;
  --warn: #f59e0b;
}
[data-theme="light"] {
  --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --border: #cbd5e1;
  --input-bg: #ffffff; --primary: #3b82f6; --danger: #ef4444; --success: #16a34a;
  --warn: #d97706;
}
* { transition: all 0.2s; box-sizing: border-box; }
body {
  font-family: system-ui, Arial, sans-serif; background: var(--bg); color: var(--text);
  margin: 0; padding: 16px;
}
.container { max-width: 800px; margin: 0 auto; }
.box {
  background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 16px;
  border: 1px solid var(--border);
}
input, select, button, textarea {
  width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px;
  border: 1px solid var(--border); background: var(--input-bg); color: var(--text);
}
button {
  background: var(--primary); border: none; cursor: pointer; font-weight: 600; color: white;
}
button:disabled { opacity: 0.6; cursor: not-allowed; }
button.danger { background: var(--danger); }
button.warn { background: var(--warn); }
button.ghost {
  background: transparent; border: 1px solid var(--border); color: var(--text);
  width: auto; padding: 8px 16px;
}
button.small { width: auto; padding: 6px 12px; font-size: 0.9rem; }
button:hover:not(:disabled) { opacity: 0.9; }
.hidden { display: none; }
.item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 0; border-bottom: 1px solid var(--border);
}
.item-left { flex: 1; }
.item-right { display: flex; align-items: center; gap: 8px; }
.income { color: var(--success); }
.expense { color: var(--danger); }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
h2, h3 { margin: 0 0 12px; }
#greeting { font-size: 1.2rem; font-weight: 600; }
canvas { max-width: 100%; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
.stat {
  background: var(--card); padding: 16px; border-radius: 10px; border: 1px solid var(--border);
}
.progress {
  height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; margin-top: 6px;
}
.progress-bar {
  height: 100%; background: var(--success); transition: width 0.3s;
}
.progress-bar.warn { background: var(--warn); }
.progress-bar.danger { background: var(--danger); }
.category-tag {
  font-size: 0.85rem; opacity: 0.8; margin-left: 6px; background: var(--border);
  padding: 2px 6px; border-radius: 4px;
}
img.proof { max-width: 100px; max-height: 100px; border-radius: 6px; cursor: pointer; }
.loading {
  text-align: center; padding: 20px; opacity: 0.8;
}
</style>
</head>
<body>
<div class="container">

  <div id="authPage" class="box">
    <h2>Catat Duit</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button id="btnSignUp">Daftar</button>
    <button id="btnLogin">Login</button>
    <button id="btnToggleTheme" class="ghost" style="margin-top:12px;">🌙 Dark Mode</button>
  </div>

  <div id="appPage" class="hidden">
    <div class="header">
      <h2 id="greeting">Halo!</h2>
      <div style="display:flex; gap:8px;">
        <button id="btnToggleThemeApp" class="ghost">🌙</button>
        <button id="btnLogout" class="danger">Logout</button>
      </div>
    </div>

    <div class="grid">
      <div class="stat">
        <small>Pemasukan Bulan Ini</small>
        <h3 id="statIncome">¥0</h3>
      </div>
      <div class="stat">
        <small>Pengeluaran Bulan Ini</small>
        <h3 id="statExpense">¥0</h3>
      </div>
      <div class="stat">
        <small>Saldo Bulan Ini</small>
        <h3 id="statBalance">¥0</h3>
      </div>
    </div>

    <div class="box">
      <h3>Upload Struk - Auto Catat</h3>
      <input type="file" id="receiptUpload" accept="image/*" capture="environment">
      <div id="scanStatus" class="hidden loading">Sedang membaca struk...</div>
    </div>

    <div class="box">
      <h3>Budget Limit</h3>
      <div id="budgetList"></div>
      <input type="number" id="budgetAmount" placeholder="Set limit pengeluaran bulan ini">
      <button id="btnSetBudget">Simpan Limit</button>
    </div>

    <div class="box">
      <h3>Filter & Search</h3>
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
        <select id="filterType">
          <option value="">Semua Tipe</option>
          <option value="income">Pemasukan</option>
          <option value="expense">Pengeluaran</option>
        </select>
        <select id="filterCategory"></select>
      </div>
      <input type="text" id="searchDesc" placeholder="Cari keterangan...">
      <input type="month" id="filterMonth">
    </div>

    <div class="box">
      <h3>Grafik Pengeluaran</h3>
      <canvas id="chart" height="200"></canvas>
    </div>

    <!-- Form manual sekarang pakai <form> -->
    <form id="txForm" class="box">
      <h3>Tambah/Edit Transaksi Manual</h3>
      <input type="hidden" id="editId">
      <select id="type">
        <option value="income">Pemasukan</option>
        <option value="expense">Pengeluaran</option>
      </select>
      <select id="category"></select>
      <input type="text" id="desc" placeholder="Keterangan opsional">
      <input type="number" id="amount" placeholder="Jumlah">
      <input type="date" id="txDate">
      <button type="submit" id="btnAdd">Simpan</button>
      <button type="button" id="btnCancelEdit" class="ghost hidden">Batal Edit</button>
    </form>

    <div class="box">
      <h3>Riwayat</h3>
      <div id="list"></div>
    </div>
  </div>

</div>

<script>
if (!window.__catatDuitAppInit) {
  window.__catatDuitAppInit = true;

  const SUPABASE_URL = 'https://wjzvnwkmmglgimamspwc.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_nfxU1mTiDHhQgDG_1U6eTQ_-7ePLctc';
  window.supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  const supabase = window.supabaseClient;

  let currentUser = null, chartInstance = null, currentBudget = 0;
  let allTransactions = [];
  let isSaving = false;

  const categories = {
    income: ['Gaji', 'Bonus', 'Freelance', 'Investasi', 'Lainnya'],
    expense: ['Makanan', 'Transport', 'Belanja', 'Tagihan', 'Hiburan', 'Kesehatan', 'Lainnya']
  };

  const formatYen = (num) => new Intl.NumberFormat('ja-JP', {
    style: 'currency', currency: 'JPY', maximumFractionDigits: 0
  }).format(num || 0);

  const getToday = () => new Date().toISOString().split('T')[0];
  const getMonth = () => new Date().toISOString().slice(0, 7);

  const themeKey = 'theme';
  const savedTheme = localStorage.getItem(themeKey) || 'dark';
  document.documentElement.setAttribute('data-theme', savedTheme);
  updateThemeButtons(savedTheme);

  function updateThemeButtons(theme) {
    const icon = theme === 'dark'? '🌙' : '☀️';
    document.getElementById('btnToggleTheme').textContent = `${icon} ${theme === 'dark'? 'Dark Mode' : 'Light Mode'}`;
    document.getElementById('btnToggleThemeApp').textContent = icon;
  }

  document.getElementById('btnToggleTheme').onclick = () => toggleTheme();
  document.getElementById('btnToggleThemeApp').onclick = () => toggleTheme();

  function toggleTheme() {
    const next = document.documentElement.getAttribute('data-theme') === 'dark'? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem(themeKey, next);
    updateThemeButtons(next);
    if (chartInstance) drawChart(window._chartData || {});
  }

  initApp();

  function initApp() {
    checkUser();
    setTodayDate();
    populateCategories();
    document.getElementById('type').onchange = populateCategories;
    document.getElementById('filterMonth').value = getMonth();

    ['filterType', 'filterCategory', 'searchDesc', 'filterMonth'].forEach(id => {
      const el = document.getElementById(id);
      el.onchange = renderTransactions;
      el.oninput = renderTransactions;
    });

    // FIX DOUBLE: pakai form submit, unbind dulu
    const txForm = document.getElementById('txForm');
    txForm.removeEventListener('submit', handleManualSubmit);
    txForm.addEventListener('submit', handleManualSubmit);

    const receiptInput = document.getElementById('receiptUpload');
    receiptInput.removeEventListener('change', handleReceiptUpload);
    receiptInput.addEventListener('change', handleReceiptUpload);

    document.getElementById('btnCancelEdit').onclick = resetForm;
    document.getElementById('btnSetBudget').onclick = handleSetBudget;
    document.getElementById('btnSignUp').onclick = handleSignUp;
    document.getElementById('btnLogin').onclick = handleLogin;
    document.getElementById('btnLogout').onclick = handleLogout;
  }

  function populateCategories() {
    const type = document.getElementById('type').value;
    const catSelect = document.getElementById('category');
    catSelect.innerHTML = '';
    categories[type].forEach(cat => {
      catSelect.innerHTML += `<option value="${cat}">${cat}</option>`;
    });
    document.getElementById('filterCategory').innerHTML = '<option value="">Semua Kategori</option>' +
      categories.expense.map(c => `<option value="${c}">${c}</option>`).join('');
  }

  function getJapaneseGreeting(name) {
    const hour = parseInt(new Intl.DateTimeFormat('en-US', {hour: 'numeric', hour12: false, timeZone: 'Asia/Tokyo'}).format(new Date()));
    let g = 'Konbanwa';
    if (hour >= 5 && hour < 11) g = 'Ohayou gozaimasu';
    else if (hour < 17) g = 'Konnichiwa';
    return `${g} ${name}-san`;
  }

  function getDisplayName(user) {
    return user?.user_metadata?.name || user?.email?.split('@')[0] || 'User';
  }

  async function checkUser() {
    const { data } = await supabase.auth.getUser();
    if (data.user) {
      currentUser = data.user;
      updateGreeting();
      showApp();
      loadBudget();
      loadTransactions();
    }
  }

  function updateGreeting() {
    document.getElementById('greeting').textContent = getJapaneseGreeting(getDisplayName(currentUser));
  }

  function setTodayDate() {
    document.getElementById('txDate').value = getToday();
  }

  async function handleSignUp() {
    const { error } = await supabase.auth.signUp({
      email: document.getElementById('email').value,
      password: document.getElementById('password').value
    });
    alert(error? 'Daftar gagal: ' + error.message : 'Daftar sukses! Login sekarang.');
  }

  async function handleLogin() {
    const { data, error } = await supabase.auth.signInWithPassword({
      email: document.getElementById('email').value,
      password: document.getElementById('password').value
    });
    if (error) alert('Login gagal: ' + error.message);
    else {
      currentUser = data.user;
      updateGreeting();
      showApp();
      loadBudget();
      loadTransactions();
      setTodayDate();
    }
  }

  async function handleLogout() {
    await supabase.auth.signOut();
    currentUser = null;
    showAuth();
    if (chartInstance) chartInstance.destroy();
  }

  function showApp() {
    document.getElementById('authPage').classList.add('hidden');
    document.getElementById('appPage').classList.remove('hidden');
  }

  function showAuth() {
    document.getElementById('authPage').classList.remove('hidden');
    document.getElementById('appPage').classList.add('hidden');
  }

  async function handleReceiptUpload(e) {
    if (isSaving) return;
    const file = e.target.files[0];
    if (!file ||!file.type.startsWith('image/')) return;

    isSaving = true;
    document.getElementById('scanStatus').classList.remove('hidden');
    e.target.disabled = true;

    try {
      const path = `${currentUser.id}/${Date.now()}_${file.name}`;
      const { data: uploadData, error: uploadError } = await supabase.storage
      .from('proofs')
      .upload(path, file);

      if (uploadError) throw uploadError;

      const { data: ocr } = await Tesseract.recognize(file, 'jpn+eng');
      const text = ocr?.data?.text || '';
      const parsed = parseReceiptText(text);

      const payload = {
        user_id: currentUser.id,
        type: 'expense',
        category: parsed.category || 'Belanja',
        "desc": parsed.store || text.split('\n')[0].slice(0, 50),
        amount: parsed.amount || 0,
        created_at: parsed.date || getToday(),
        proof_url: uploadData.path
      };

      if (payload.amount > 0) {
        const { error } = await supabase.from('transactions').insert([payload]);
        if (error) throw error;

        alert(`Berhasil! ${payload.desc} - ${formatYen(payload.amount)}`);
        await loadTransactions();
        await loadBudget();
        e.target.value = '';
      } else {
        alert('Gagal baca total. Coba foto yang lebih jelas.');
      }
    } catch (err) {
      console.error(err);
      alert('Gagal scan struk: ' + err.message);
    } finally {
      isSaving = false;
      document.getElementById('scanStatus').classList.add('hidden');
      e.target.disabled = false;
    }
  }

  function parseReceiptText(text) {
    let amount = 0;
    let date = getToday();
    let store = 'Struk';
    let category = 'Belanja';

    const amountMatches = text.match(/(合計|Total|¥|￥)\s*([\d,]+)/g);
    if (amountMatches) {
      const lastMatch = amountMatches[amountMatches.length - 1];
      const numStr = lastMatch.replace(/[^0-9]/g, '');
      amount = parseInt(numStr) || 0;
    }

    const dateMatch = text.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
    if (dateMatch) {
      const y = dateMatch[1];
      const m = dateMatch[2].padStart(2, '0');
      const d = dateMatch[3].padStart(2, '0');
      date = `${y}-${m}-${d}`;
    }

    const storeLine = text.split('\n')[0].toLowerCase();
    if (storeLine.includes('konbini') || storeLine.includes('lawson') || storeLine.includes('family')) {
      category = 'Makanan';
    } else if (storeLine.includes('train') || storeLine.includes('jr') || storeLine.includes('metro')) {
      category = 'Transport';
    }
    store = text.split('\n')[0].slice(0, 30).trim();

    return { amount, date, store, category };
  }

  async function handleManualSubmit(e) {
    e.preventDefault();
    if (isSaving) return;

    isSaving = true;
    const btn = document.getElementById('btnAdd');
    btn.disabled = true;

    try {
      const id = document.getElementById('editId').value;
      const dateVal = document.getElementById('txDate').value || getToday();

      const payload = {
        user_id: currentUser.id,
        type: document.getElementById('type').value,
        category: document.getElementById('category').value,
        "desc": document.getElementById('desc').value,
        amount: parseFloat(document.getElementById('amount').value) || 0,
        created_at: dateVal,
        proof_url: null
      };

      if (!payload.amount || payload.amount <= 0) {
        alert('Jumlah harus lebih dari 0');
        return;
      }

      const { error } = id
      ? await supabase.from('transactions').update(payload).eq('id', id)
        : await supabase.from('transactions').insert([payload]);

      if (error) {
        alert('Gagal simpan: ' + error.message);
      } else {
        resetForm();
        await loadTransactions();
        await loadBudget();
      }
    } catch(err) {
      alert('Error: ' + err.message);
    } finally {
      isSaving = false;
      btn.disabled = false;
    }
  }

  async function handleSetBudget() {
    const amount = parseFloat(document.getElementById('budgetAmount').value) || 0;
    const month = getMonth();
    await supabase.from('budgets').upsert({user_id: currentUser.id, month, amount});
    currentBudget = amount;
    renderBudget();
    loadTransactions();
  }

  async function loadBudget() {
    const month = getMonth();
    const { data } = await supabase
    .from('budgets')
    .select('amount')
    .eq('user_id', currentUser.id)
    .eq('month', month)
    .maybeSingle();
    currentBudget = data?.amount || 0;
    renderBudget();
  }

  function renderBudget() {
    const spent = allTransactions.filter(t => t.type === 'expense' && t.created_at && t.created_at.startsWith(getMonth()))
    .reduce((a, b) => a + (b.amount || 0), 0);
    const percent = currentBudget? Math.min(100, (spent / currentBudget) * 100) : 0;
    const barClass = percent > 80? 'danger' : percent > 60? 'warn' : '';

    document.getElementById('budgetList').innerHTML = `
      <div>Limit: ${formatYen(currentBudget)} | Terpakai: ${formatYen(spent)}</div>
      <div class="progress"><div class="progress-bar ${barClass}" style="width:${percent}%"></div></div>
    `;
  }

  function resetForm() {
    document.getElementById('editId').value = '';
    document.getElementById('desc').value = '';
    document.getElementById('amount').value = '';
    setTodayDate();
    document.getElementById('btnAdd').textContent = 'Simpan';
    document.getElementById('btnCancelEdit').classList.add('hidden');
  }

  async function deleteTransaction(id) {
    if (!confirm('Hapus transaksi ini?')) return;
    await supabase.from('transactions').delete().eq('id', id).eq('user_id', currentUser.id);
    loadTransactions();
    loadBudget();
  }

  function editTransaction(t) {
    document.getElementById('editId').value = t.id;
    document.getElementById('type').value = t.type;
    populateCategories();
    document.getElementById('category').value = t.category;
    document.getElementById('desc').value = t.desc || '';
    document.getElementById('amount').value = t.amount || '';
    document.getElementById('txDate').value = t.created_at? t.created_at.split('T')[0] : getToday();
    document.getElementById('btnAdd').textContent = 'Update';
    document.getElementById('btnCancelEdit').classList.remove('hidden');
    window.scrollTo(0, document.getElementById('btnAdd').offsetTop);
  }

  async function loadTransactions() {
    if (!currentUser) return;
    allTransactions = [];

    const { data, error } = await supabase
    .from('transactions')
    .select('*')
    .eq('user_id', currentUser.id)
    .order('created_at', { ascending: false });

    if (error) {
      console.error(error);
      return;
    }

    const seen = new Set();
    allTransactions = (data || []).filter(t => {
      if (seen.has(t.id)) return false;
      seen.add(t.id);
      return true;
    });

    renderTransactions();
    renderBudget();
  }

  function renderTransactions() {
    const fType = document.getElementById('filterType').value;
    const fCat = document.getElementById('filterCategory').value;
    const fSearch = (document.getElementById('searchDesc').value || '').toLowerCase();
    const fMonth = document.getElementById('filterMonth').value;

    const filtered = allTransactions.filter(t => {
      if (!t ||!t.created_at) return false;
      const matchType =!fType || t.type === fType;
      const matchCat =!fCat || t.category === fCat;
      const matchSearch =!fSearch || (t.desc || '').toLowerCase().includes(fSearch);
      const matchMonth =!fMonth || t.created_at.startsWith(fMonth);
      return matchType && matchCat && matchSearch && matchMonth;
    });

    let income = 0, expense = 0;
    const catTotals = {};
    let html = '';

    document.getElementById('list').innerHTML = '';

    filtered.forEach(t => {
      if (t.type === 'income') income += t.amount || 0;
      else {
        expense += t.amount || 0;
        catTotals[t.category || 'Lainnya'] = (catTotals[t.category || 'Lainnya'] || 0) + (t.amount || 0);
      }

      const sign = t.type === 'income'? '+' : '-';
      const cls = t.type === 'income'? 'income' : 'expense';
      const proof = t.proof_url
      ? `<img src="${supabase.storage.from('proofs').getPublicUrl(t.proof_url).data.publicUrl}" class="proof" onclick="window.open(this.src)">`
        : '';

      html += `<div class="item">
        <div class="item-left">
          <div>${t.desc || t.category || 'Tanpa keterangan'} <span class="category-tag">${t.category || '-'}</span></div>
          <small>${t.created_at? new Date(t.created_at).toLocaleDateString('ja-JP') : '-'}</small>
          ${proof}
        </div>
        <div class="item-right">
          <div class="${cls}">${sign} ${formatYen(t.amount)}</div>
          <button class="warn small" onclick='editTransaction(${JSON.stringify(t)})'>Edit</button>
          <button class="danger small" onclick="deleteTransaction(${t.id})">Hapus</button>
        </div>
      </div>`;
    });

    document.getElementById('list').innerHTML = html || '<div>Belum ada transaksi</div>';
    document.getElementById('statIncome').textContent = formatYen(income);
    document.getElementById('statExpense').textContent = formatYen(expense);
    document.getElementById('statBalance').textContent = formatYen(income - expense);

    window._chartData = catTotals;
    drawChart(catTotals);
  }

  function drawChart(catTotals) {
    const ctx = document.getElementById('chart').getContext('2d');
    if (chartInstance) chartInstance.destroy();

    const labels = Object.keys(catTotals);
    const data = Object.values(catTotals);
    const textColor = getComputedStyle(document.documentElement).getPropertyValue('--text');

    chartInstance = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels,
        datasets: [{ data, backgroundColor: ['#3b82f6', '#22c55e', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#14b8a6'] }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { position: 'bottom', labels: { color: textColor } },
          tooltip: {
            callbacks: { label: ctx => `${ctx.label}: ${formatYen(ctx.parsed)}` }
          }
        }
      }
    });
  }

  window.deleteTransaction = deleteTransaction;
  window.editTransaction = editTransaction;

  if ('serviceWorker' in navigator &&!navigator.serviceWorker.controller) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
      .then(reg => console.log('SW registered'))
      .catch(err => console.log('SW failed:', err));
    });
  }
}
</script>
</body>
</html>
