<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catat Duit</title>

<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { 
  font-family: system-ui, Arial, sans-serif; 
  background: #0f172a; 
  color: #e2e8f0; 
  margin: 0; 
  padding: 16px;
}
.container { 
  max-width: 600px; 
  margin: 0 auto; 
}
.box { 
  background: #1e293b; 
  padding: 20px; 
  border-radius: 12px; 
  margin-bottom: 16px;
}
input, select, button { 
  width: 100%; 
  padding: 12px; 
  margin: 8px 0; 
  border-radius: 8px; 
  border: 1px solid #334155; 
  background: #0f172a; 
  color: #e2e8f0; 
  box-sizing: border-box;
}
button { 
  background: #3b82f6; 
  border: none; 
  cursor: pointer; 
  font-weight: 600;
}
button.danger { background: #ef4444; }
button:hover { opacity: 0.9; }
.hidden { display: none; }
.item { 
  display: flex; 
  justify-content: space-between; 
  padding: 12px 0; 
  border-bottom: 1px solid #334155;
}
.income { color: #22c55e; }
.expense { color: #ef4444; }
.header { 
  display: flex; 
  justify-content: space-between; 
  align-items: center; 
  margin-bottom: 16px;
}
h2, h3 { margin: 0 0 12px; }
</style>
</head>
<body>
<div class="container">
  
  <!-- Halaman Login -->
  <div id="authPage" class="box">
    <h2>Catat Duit</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button id="btnSignUp">Daftar</button>
    <button id="btnLogin">Login</button>
  </div>

  <!-- Halaman App -->
  <div id="appPage" class="hidden">
    <div class="header">
      <h2>Halo!</h2>
      <button id="btnLogout" class="danger" style="width:auto; padding:8px 16px;">Logout</button>
    </div>

    <div class="box">
      <h3>Total Saldo: <span id="balance">Rp 0</span></h3>
    </div>

    <div class="box">
      <h3>Tambah Transaksi</h3>
      <select id="type">
        <option value="income">Pemasukan</option>
        <option value="expense">Pengeluaran</option>
      </select>
      <input type="text" id="desc" placeholder="Keterangan">
      <input type="number" id="amount" placeholder="Jumlah">
      <button id="btnAdd">Simpan</button>
    </div>

    <div class="box">
      <h3>Riwayat</h3>
      <div id="list"></div>
    </div>
  </div>

</div>

<script>
const SUPABASE_URL = 'https://wjzvnwkmmglgimamspwc.supabase.co';
const SUPABASE_KEY = 'sb_publishable_nfxU1mTiDHhQgDG_1U6eTQ_-7ePLctc';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;

// Cek session saat buka halaman
checkUser();

async function checkUser() {
  const { data: { user } = await supabase.auth.getUser();
  if (user) {
    currentUser = user;
    showApp();
    loadTransactions();
  }
}

// Auth
document.getElementById('btnSignUp').onclick = async () => {
  const { error } = await supabase.auth.signUp({
    email: email.value,
    password: password.value
  });
  if (error) alert('Daftar gagal: ' + error.message);
  else alert('Daftar sukses! Login sekarang.');
};

document.getElementById('btnLogin').onclick = async () => {
  const { data, error } = await supabase.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });
  if (error) alert('Login gagal: ' + error.message);
  else {
    currentUser = data.user;
    showApp();
    loadTransactions();
  }
};

document.getElementById('btnLogout').onclick = async () => {
  await supabase.auth.signOut();
  currentUser = null;
  showAuth();
};

// Tampilkan halaman
function showApp() {
  document.getElementById('authPage').classList.add('hidden');
  document.getElementById('appPage').classList.remove('hidden');
}
function showAuth() {
  document.getElementById('authPage').classList.remove('hidden');
  document.getElementById('appPage').classList.add('hidden');
}

// CRUD Transaksi
document.getElementById('btnAdd').onclick = async () => {
  const { error } = await supabase.from('transactions').insert([{
    user_id: currentUser.id,
    type: document.getElementById('type').value,
    desc: document.getElementById('desc').value,
    amount: parseFloat(document.getElementById('amount').value)
  }]);
  if (error) alert('Gagal simpan: ' + error.message);
  else {
    document.getElementById('desc').value = '';
    document.getElementById('amount').value = '';
    loadTransactions();
  }
};

async function loadTransactions() {
  const { data, error } = await supabase
    .from('transactions')
    .select('*')
    .eq('user_id', currentUser.id)
    .order('created_at', { ascending: false });

  if (error) {
    console.error(error);
    return;
  }

  let html = '';
  let balance = 0;
  
  data.forEach(t => {
    const sign = t.type === 'income' ? '+' : '-';
    const cls = t.type === 'income' ? 'income' : 'expense';
    balance += t.type === 'income' ? t.amount : -t.amount;
    html += `<div class="item">
      <div>
        <div>${t.desc}</div>
        <small>${new Date(t.created_at).toLocaleDateString('id-ID')}</small>
      </div>
      <div class="${cls}">${sign} Rp ${t.amount.toLocaleString('id-ID')}</div>
    </div>`;
  });
  
  document.getElementById('list').innerHTML = html || '<div>Belum ada transaksi</div>';
  document.getElementById('balance').innerText = 'Rp ' + balance.toLocaleString('id-ID');
}
</script>
</body>
</html>
